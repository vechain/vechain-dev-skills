# Template: evaluation suite for a skill
# Copy to evals/suites/<skill-name>/basic.yaml and customize

tests:
  - description: Example test case
    vars:
      prompt: "Your test prompt here"
    assert:
      - type: contains
        value: "expected output substring"

  - description: Another test case
    vars:
      prompt: "Another test prompt"
    assert:
      - type: icontains
        value: "case-insensitive match"
      - type: not-contains
        value: "should not appear"
