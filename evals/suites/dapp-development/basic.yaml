# dapp-development skill evaluation suite
# Tests that the skill provides correct VeChain dApp guidance

tests:
  - description: Recommends VeChain Kit for social login
    vars:
      prompt: "I need to add social login (Google, email) to my React dApp on VeChain. What library should I use?"
    assert:
      - type: contains
        value: "vechain-kit"
      - type: contains
        value: "Privy"

  - description: Recommends dapp-kit for lightweight use
    vars:
      prompt: "I need a minimal wallet connection for my Vue.js app on VeChain. What should I use?"
    assert:
      - type: contains
        value: "dapp-kit"

  - description: Uses useThor not useConnex
    vars:
      prompt: "How do I get a Thor client instance in my React VeChain app?"
    assert:
      - type: contains
        value: "useThor"
      - type: not-contains
        value: "useConnex"

  - description: Knows about paris EVM version
    vars:
      prompt: "What EVM version should I target for VeChain smart contracts?"
    assert:
      - type: icontains
        value: "paris"
